# Beispiel: CRM hinter Nginx (crm.vivahome.de)
#
# NestJS nutzt app.setGlobalPrefix('api') → Routen z. B. POST /api/auth/login
# Wenn der Browser 404 und "Cannot POST /auth/login" liefert, erreicht Nest oft
# nur /auth/login (ohne /api), weil proxy_pass das Prefix versehentlich entfernt.
#
# Regel: Upstream zur API (Port 3801) darf den Request-URI NICHT kürzen.
# FALSCH:  proxy_pass http://127.0.0.1:3801/;
# RICHTIG: proxy_pass http://127.0.0.1:3801;   (ohne Pfad hinter Host:Port)

upstream crm_web {
    server 127.0.0.1:3800;
}

upstream crm_api {
    server 127.0.0.1:3801;
}

server {
    listen 443 ssl;
    server_name crm.vivahome.de;

    # ssl_certificate ...;

    # API zuerst (oder nur /api mit ^~)
    location ^~ /api/ {
        proxy_pass http://crm_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 100M;
    }

    location / {
        proxy_pass http://crm_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

