services:
  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: crm_monteur
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crm_monteur"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    container_name: crm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioad
      MINIO_ROOT_PASSWORD: Vivahome%2026
      MINIO_BROWSER_REDIRECT_URL: https://s3.vivahome.de
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: crm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/crm_monteur
      JWT_SECRET: change-me
      API_PORT: 3801
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: minioad
      MINIO_ROOT_PASSWORD: Vivahome%2026
      MINIO_BUCKET: crm-documents
      MINIO_USE_SSL: "false"
      STORAGE_LOCAL_FALLBACK: "true"
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_FROM: crm@example.local
    ports:
      - "3801:3801"
    volumes:
      - app_storage:/app/storage

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: crm-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3800:3800"

volumes:
  postgres_data:
  minio_data:
  app_storage:
